<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening link…</title>
</head>
<body>
<script>
(function () {
    const linkId = new URLSearchParams(window.location.search).get('linkId');
    if (linkId) {
        window.location.replace(
            window.location.origin +
            window.location.pathname.replace('verify.html', 'index.html') +
            '?linkId=' + encodeURIComponent(linkId)
        );
    }
})();
</script>
</body>
</html>
