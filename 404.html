<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting…</title>
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center;
               height: 100vh; font-family: system-ui, sans-serif; background: #0d1117; color: #e2e8f0; }
        p { font-size: 14px; color: #64748b; }
    </style>
</head>
<body>
<p>Redirecting…</p>
<script>
// GitHub Pages 404 redirect trick for /verify/{linkId} short links.
// When GitHub Pages 404s on /verify/LNK-XXXXX, it serves this page.
// We detect the pattern, store the linkId, then redirect to /verify/
// which will read it from sessionStorage.
(function () {
    const path = window.location.pathname;

    // Match /verify/{linkId}
    const match = path.match(/\/verify\/([^/?#]+)/);
    if (match) {
        // OPTIMIZED: Skip the /verify/ intermediary page entirely.
        // Previously: stored linkId in sessionStorage → redirected to /verify/ → that
        // page read sessionStorage → redirected to /camera.access/index.html.
        // Now: jump directly to the final destination in one hop, saving a full
        // page-load round-trip (~200-400 ms).
        // Detect the repo base path dynamically from the current URL
        var basePath = window.location.pathname.match(/^\/[^/]+\//);
        basePath = basePath ? basePath[0] : '/';
        window.location.replace(
            window.location.origin +
            basePath + 'index.html?linkId=' + encodeURIComponent(match[1])
        );
        return;
    }

    // Not a short-link 404 — show a generic message.
    document.querySelector('p').textContent = '404 — Page not found.';
})();
</script>
</body>
</html>
